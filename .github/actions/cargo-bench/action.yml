name: cargo miri
description: cargo miri

inputs:
  args:
    description: "args"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - run: cargo install cargo-codspeed --locked
      shell: pwsh
    - name: Build the benchmark target(s)
      run: cargo codspeed build ${{inputs.args}}
      shell: pwsh
    - name: Run the benchmarks
      uses: CodSpeedHQ/action@v4
      with:
        run: cargo codspeed run
        mode: simulation
