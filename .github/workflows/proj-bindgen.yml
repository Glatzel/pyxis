name: proj-bindgen
on:
  workflow_dispatch:
env:
  RUST_ROOT: ./rust
permissions:
  contents: read
jobs:
  proj-bindings:
    strategy:
      fail-fast: false
      matrix:
        include:
          - machine: windows-latest
            os: win
          - machine: ubuntu-latest
            os: linux
          - machine: macos-latest
            os: macos
          - machine: ubuntu-24.04-arm
            os: linux-aarch64
    runs-on: ${{matrix.machine}}
    env:
      RUSTFLAGS: "-Dwarnings"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/rust/setup-rust
      - name: proj-bindings
        run: |
          ${{env.RUST_ROOT}}/scripts/proj-bindings.ps1
        shell: pwsh
      - name: upload
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: proj-bindings-${{matrix.os}}
          path: rust/crates/proj-sys/src/bindings-${{matrix.os}}.rs
          if-no-files-found: error
