name: proj-bindgen
on:
  workflow_dispatch:
env:
  RUST_ROOT: ./rust
permissions:
  contents: read
jobs:
  proj-bindings:
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: "-Dwarnings"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/rust/setup-rust
      - name: proj-bindings
        run: |
          ${{env.RUST_ROOT}}/scripts/proj-bindings.ps1
        shell: pwsh
      - name: upload
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: proj-bindings
          path: rust/crates/proj-sys/src/bindings.rs
          if-no-files-found: error
